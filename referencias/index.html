<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#0b1a33,#02040a 65%);
  color:#fff;
}

/* ================= HEADER ================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  background:rgba(2,4,10,.9);
  border-bottom:1px solid rgba(30,144,255,.25);
  box-shadow:0 0 25px rgba(30,144,255,.35);
}
header h1{color:#1e90ff}

.btn-home{
  padding:10px 22px;
  border-radius:14px;
  background:rgba(5,15,30,.9);
  color:#cfe7ff;
  text-decoration:none;
  box-shadow:0 0 18px rgba(30,144,255,.45);
  transition:.3s;
}
.btn-home:hover{
  background:linear-gradient(135deg,#1e90ff,#4da3ff);
  box-shadow:0 0 25px rgba(30,144,255,.85);
  transform:translateY(-2px);
}


/* ================= MAIN ================= */
main{
  max-width:900px;
  margin:90px auto;
  padding:20px;
}
#slider-wrapper{position:relative;min-height:240px}

/* ================= CARD ================= */
.card{
  background:rgba(5,15,30,.9);
  border-radius:26px;
  padding:30px;
  position:relative;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.04),
    0 0 20px rgba(30,144,255,.28),
    0 18px 45px rgba(2,4,10,.9);
  animation:fadeSlide .55s ease;
  transition:.3s;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.06),
    0 0 26px rgba(30,144,255,.45),
    0 22px 55px rgba(2,4,10,.95);
}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(12px) scale(.98);filter:blur(6px)}
  to{opacity:1;transform:none;filter:none}
}

.ref-header{display:flex;gap:12px;margin-bottom:14px}
.ref-header img{width:38px}
.ref-header span{color:#1e90ff}
.ref-text{
  margin-top:10px;
  flex:1;
  overflow-y:auto;
  padding-right:6px;

  /* scroll bonito e discreto */
  scrollbar-width:thin;
  scrollbar-color:#1e90ff transparent;
}

/* Scroll Chrome / Edge */
.ref-text::-webkit-scrollbar{
  width:6px;
}
.ref-text::-webkit-scrollbar-thumb{
  background:#1e90ff;
  border-radius:6px;
}
.ref-text{
  mask-image:linear-gradient(
    to bottom,
    black 85%,
    transparent 100%
  );
}



/* ================= FORM ================= */
form{
  margin-top:60px;
  background:rgba(5,15,30,.9);
  padding:32px;
  border-radius:28px;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.05),
    0 0 35px rgba(30,144,255,.35),
    0 20px 60px rgba(2,4,10,.95);
}
input,
textarea{
  width:100%;
  padding:14px 16px;
  margin-bottom:14px;

  border-radius:14px;
  border:1px solid rgba(59,130,246,.25);

  background:rgba(8,18,35,.85);
  color:#e5e7eb;

  outline:none;
  resize:none;

  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.05),
    0 0 0 rgba(0,0,0,0);

  transition:border .25s ease, box-shadow .25s ease;
}

input:focus,
textarea:focus{
  border-color:#3b82f6;
  box-shadow:
    0 0 0 2px rgba(59,130,246,.25),
    inset 0 1px 2px rgba(255,255,255,.05);
}
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:28px;
  background:linear-gradient(135deg,#1e90ff,#0066ff);
  color:#fff;
  font-weight:bold;
  position:relative;
  overflow:hidden;
}
button::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,
    transparent 30%,
    rgba(255,255,255,.45),
    transparent 70%);
  transform:translateX(-120%);
}
button:hover::after{
  transform:translateX(120%);
  transition:.6s;
}

.success,.error{text-align:center;display:none;font-weight:bold}
.success{color:#00ff9c}
.error{color:#ff5c5c}

/* ================= MOBILE ================= */
@media(max-width:768px){
  #counter{transform:scale(.9)}
  .card{animation:none}
}
/* Card sempre na mesma altura */
.card{
  height:260px;              /* ajuste se quiser mais/menos */
  display:flex;
  flex-direction:column;
}


/* ===============================
   CONTADOR CENTRALIZADO PERFEITO
================================ */

#counter{
  text-align:center;
  font-family:Arial, sans-serif;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* Número */
#counterNumber{
  font-size:38px;
  font-weight:900;
  color:hwb(0 100% 0%);

  text-align:center;

  text-shadow:
    0 0 12px rgba(0,191,255,1),
    0 0 30px rgba(0,191,255,.9);
}

/* Texto abaixo */
#counter small{
  margin-top:5px;
  font-size:16px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#00bfff;

  text-align:center;

  text-shadow:
    0 0 12px rgba(0,191,255,1),
    0 0 30px rgba(0,191,255,.9);
}
</style>

<body>

<header>
  <h1>
  🌝 <span class="titulo-energia">Deixe sua Referencia</span>
</h1>

  <a class="btn-home" href="https://4sstore.vercel.app/">
    ♻️𝙿𝚊𝚐𝚒𝚗𝚊 𝚒𝚗𝚒𝚌𝚒𝚊𝚕

  <style>
    .titulo-energia {
  font-weight: 600;
  font-size: 20px; /* controla o tamanho aqui */
  letter-spacing: 1px;
      background: linear-gradient(
        90deg,
        #ffffff 0%,

   FLASH PROFISSIONAL AO ATUALIZAR
================================ */

}

.counter-pulse{
  transform: scale(1.08);
  text-shadow:

<script>

firebase.initializeApp({
  apiKey:"AIzaSyBGeptReBViZ9CQoJ2G18SmnaxbnvO3kDw",
  authDomain:"referenciasjogadores.firebaseapp.com",
  projectId:"referenciasjogadores"
});

const db = firebase.firestore();

let refs = [];
let index = 0;

const slider = document.getElementById("slider");
const counterNumber = document.getElementById("counterNumber");

/* ================= RENDER ================= */

function render(){

  if(!refs.length) return;

  const r = refs[index];

  slider.style.opacity="0";
  slider.style.transform="translateY(10px)";

  setTimeout(()=>{

    slider.innerHTML = `
      <div class="card">
        <div class="ref-header">
          <img src="https://cdn3.emoji.gg/emojis/701524-neon-gmail-icon.png">
          <div>
            <strong>${r.fullname}</strong><br>
            <span>${r.nickname}</span>
          </div>
        </div>
        <div class="ref-text">${r.message}</div>
      </div>
    `;

    slider.style.opacity="1";
    slider.style.transform="translateY(0)";

  },180);

}

/* ================= CONTADOR ================= */

function updateCounter(total){

  counterNumber.textContent = `✔️${total}`;

  counterNumber.classList.remove("counter-pulse");
  void counterNumber.offsetWidth;
  counterNumber.classList.add("counter-pulse");

}

/* ================= FIREBASE LISTENER ================= */

db.collection("referencias")
.orderBy("timestamp","desc")
.onSnapshot(snapshot=>{

  refs = [];

  snapshot.forEach(doc=>{

    const data = doc.data();

    if(data.timestamp){
      refs.push(data);
    }

  });

  updateCounter(refs.length);

  index = 0;

  render();

});

/* ================= AUTO SLIDE ================= */

setInterval(()=>{

  if(refs.length){

    index = (index + 1) % refs.length;

    render();

  }

},6000);

/* ================= CLICK SLIDE ================= */

slider.addEventListener("click",()=>{

  if(refs.length > 1){

    index = (index + 1) % refs.length;

    render();

  }

});

/* ================= ENVIO ================= */

const form = document.getElementById("form");
const fullname = document.getElementById("fullname");
const nickname = document.getElementById("nickname");
const email = document.getElementById("email");
const message = document.getElementById("message");

const success = document.getElementById("success");
const error = document.getElementById("error");

form.addEventListener("submit", async e => {

  e.preventDefault();

  error.style.display="none";
  success.style.display="none";

  const data = {

    fullname: fullname.value.trim(),
    nickname: nickname.value.trim(),
    email: email.value.trim(),
    message: message.value.trim(),
    timestamp: firebase.firestore.FieldValue.serverTimestamp()

  };

  try{

    const [a,c] = await Promise.all([

  db.collection("referencias").where("email","==",data.email).get(),
  db.collection("referencias").where("nickname","==",data.nickname).get()

]);

if(!a.empty || !c.empty){

  error.textContent="Email ou nickname já utilizado.";
  error.style.display="block";
  return;

}

    await db.collection("referencias").add(data);

    success.style.display="block";

    form.reset();

  }catch(err){

    console.error(err);

    error.textContent="Erro ao enviar referência.";
    error.style.display="block";

  }

});

</script>

<script>
/* ===== CONFIGURAR IMAGENS AQUI ===== */
const proofFolder = "/public/provas/";
const proofFiles = [
  "Simarillion Keeper.gif",
  "joker.gif",
  "L.gif",
  "Grand General.gif",
];

/* =================================== */

const proofImages = proofFiles.map(file => proofFolder + file);

let proofIndex = 0;
const proofImg = document.getElementById("proofCarouselImage");

function updateProof(){
  proofImg.style.opacity = "0";

  setTimeout(()=>{
    proofImg.src = proofImages[proofIndex];
    proofImg.style.opacity = "1";
  },200);
}

function nextProof(){
  proofIndex = (proofIndex + 1) % proofImages.length;
  updateProof();
}

updateProof();
setInterval(nextProof, 4000);

/* ===== ZOOM AO CLICAR ===== */
proofImg.onclick = function(){
  const modal = document.createElement("div");
  modal.style = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
  `;

  const img = document.createElement("img");
  img.src = this.src;
  img.style = `
    max-width:90%;
    max-height:90%;
    border-radius:20px;
    box-shadow:0 0 50px rgba(30,144,255,.7);
  `;

  modal.appendChild(img);
  document.body.appendChild(modal);

  modal.onclick = () => modal.remove();
};
</script>
