<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Referências | 4S Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/public/favicon.png" type="image/png">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
/* SEU CSS ORIGINAL FOI MANTIDO */
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:
radial-gradient(circle at top,#0b1a33,#02040a 70%);
color:#e6edf3;
line-height:1.5;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;

background:rgba(5,10,18,.85);
backdrop-filter:blur(10px);

border-bottom:1px solid rgba(30,144,255,.25);

box-shadow:
0 0 30px rgba(30,144,255,.25);
}

header h1{
font-size:20px;
letter-spacing:.5px;
color:#4db3ff;
}

header a{
padding:10px 18px;
border-radius:14px;

background:rgba(30,144,255,.1);

color:#cfe8ff;
text-decoration:none;

transition:.25s;
}

header a:hover{
background:#1e90ff;
color:white;
}

/* MAIN */

main{
max-width:950px;
margin:80px auto;
padding:30px;
}

/* COUNTER */

#counter{
text-align:center;
margin-bottom:50px;
}

#counterNumber{
font-size:42px;
font-weight:800;

color:#7ed0ff;

text-shadow:
0 0 12px rgba(0,191,255,.9),
0 0 25px rgba(0,191,255,.6);
}

#counter small{
opacity:.7;
letter-spacing:1px;
}

/* SLIDER */

#slider-wrapper{
position:relative;
min-height:260px;
margin-bottom:40px;
}

/* CARD */

.card{
background:linear-gradient(
180deg,
rgba(8,18,35,.95),
rgba(4,10,20,.95)
);

border-radius:24px;

padding:32px;

height:260px;

display:flex;
flex-direction:column;

border:1px solid rgba(30,144,255,.2);

box-shadow:
0 0 25px rgba(30,144,255,.15),
0 15px 40px rgba(0,0,0,.6);

transition:.25s;
}

.card:hover{
transform:translateY(-3px);

box-shadow:
0 0 35px rgba(30,144,255,.35),
0 20px 50px rgba(0,0,0,.8);
}

.ref-header{
display:flex;
gap:12px;
align-items:center;
margin-bottom:12px;
}

.ref-header img{
width:36px;
height:36px;
}

.ref-header strong{
font-size:16px;
}

.ref-header span{
font-size:13px;
color:#4db3ff;
opacity:.8;
}

.ref-text{
margin-top:6px;
opacity:.9;
}

/* GALERIA */

#proofCarouselImage{

width:100%;
max-width:900px;

border-radius:18px;

border:1px solid rgba(30,144,255,.25);

box-shadow:
0 0 25px rgba(30,144,255,.25),
0 15px 40px rgba(0,0,0,.7);

transition:.35s;

margin:40px 0;
}

#proofCarouselImage:hover{
transform:scale(1.02);

box-shadow:
0 0 35px rgba(30,144,255,.5),
0 20px 50px rgba(0,0,0,.9);
}

/* FORM */

form{
margin-top:40px;

background:
linear-gradient(
180deg,
rgba(8,18,35,.95),
rgba(4,10,20,.95)
);

padding:32px;

border-radius:22px;

border:1px solid rgba(30,144,255,.2);

box-shadow:
0 0 25px rgba(30,144,255,.15),
0 20px 45px rgba(0,0,0,.8);
}

input,textarea{

width:100%;

padding:14px 16px;

margin-bottom:14px;

border-radius:12px;

border:1px solid rgba(30,144,255,.2);

background:rgba(5,12,25,.85);

color:#e6edf3;

transition:.2s;
}

input:focus,
textarea:focus{

outline:none;

border-color:#1e90ff;

box-shadow:
0 0 10px rgba(30,144,255,.5);
}

textarea{
resize:none;
min-height:90px;
}

/* BOTÃO */

button{

width:100%;

padding:15px;

border:none;

border-radius:16px;

background:linear-gradient(
135deg,
#1e90ff,
#0066ff
);

color:white;

font-weight:600;

letter-spacing:.3px;

cursor:pointer;

transition:.25s;
}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 20px rgba(30,144,255,.7);
}

/* MENSAGENS */

.success{
color:#00ffa6;
text-align:center;
display:none;
margin-top:10px;
}

.error{
color:#ff5c5c;
text-align:center;
display:none;
margin-top:10px;
}
.badge{

margin-left:8px;

font-size:12px;

padding:4px 10px;

border-radius:10px;

background:#0f2a44;

border:1px solid rgba(30,144,255,.5);

color:#1e90ff;

font-weight:600;

letter-spacing:.3px;


}

.nick{

font-size:13px;

color:#4db3ff;

opacity:.8;

}

.avatar{
width:42px;
height:42px;
object-fit:cover;

}
</style>
</head>

<body>

<header>
<h1>🌝 Deixe sua Referencia</h1>
<a href="https://4sstore.vercel.app/">♻️Pagina inicial</a>
</header>

<main>


</div>

<!-- CONTADOR -->
<div id="counter">
<div id="counterNumber">✔️0</div>
<small>Referências</small>
</div>

<!-- SLIDER -->
<div id="slider-wrapper">
<div id="slider"></div>
</div>
<!-- GALERIA -->

<div style="text-align:center;margin-bottom:40px">



<img id="proofCarouselImage"
style="width:100%;max-width:900px;border-radius:18px">

<!-- FORM -->
<form id="form">

<input id="fullname" placeholder="Seu nome" required>
<input id="nickname" placeholder="Seu nickname" required>
<input id="email" placeholder="Seu email" required>
<textarea id="message" placeholder="Sua referência" required></textarea>

<button type="submit">Enviar referência</button>

<div id="success" class="success">Referência enviada!</div>
<div id="error" class="error"></div>

</form>

</main>

<script>

firebase.initializeApp({
apiKey:"AIzaSyBGeptReBViZ9CQoJ2G18SmnaxbnvO3kDw",
authDomain:"referenciasjogadores.firebaseapp.com",
projectId:"referenciasjogadores"
});

const db = firebase.firestore();

let refs=[];
let index=0;

const slider=document.getElementById("slider");
const counterNumber=document.getElementById("counterNumber");

function render(){

if(!refs.length) return;

const r=refs[index];

slider.innerHTML=`
<div class="card">

<div class="ref-header">

<img class="avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(r.nickname)}">
<div>

<strong>
${r.fullname}
<span class="badge">💎Cliente</span>
</strong>

<br>

<span class="nick">#${r.nickname}</span>

</div>

</div>

<div class="ref-text">
${r.message}
</div>

</div>
`;

}

function updateCounter(total){
counterNumber.textContent=`✔️${total}`;
}

db.collection("referencias")
.orderBy("timestamp","desc")
.onSnapshot(snapshot=>{

refs=[];

snapshot.forEach(doc=>{
const data=doc.data();
if(data.timestamp) refs.push(data);
});

updateCounter(refs.length);

index=0;
render();

});

setInterval(()=>{
if(refs.length){
index=(index+1)%refs.length;
render();
}
},6000);
slider.addEventListener("click", () => {

if(refs.length > 1){

index = (index + 1) % refs.length;

render();

}

});
const form=document.getElementById("form");

form.addEventListener("submit", async e => {

e.preventDefault();

const fullname=document.getElementById("fullname").value.trim();
const nickname=document.getElementById("nickname").value.trim();
const email=document.getElementById("email").value.trim();
const message=document.getElementById("message").value.trim();

const success=document.getElementById("success");
const error=document.getElementById("error");

success.style.display="none";
error.style.display="none";

try{

/* verifica email e nickname */
const [emailCheck, nickCheck] = await Promise.all([

db.collection("referencias")
.where("email","==",email)
.get(),

db.collection("referencias")
.where("nickname","==",nickname)
.get()

]);

if(!emailCheck.empty){

error.textContent="Este email já enviou uma referência.";
error.style.display="block";
return;

}

if(!nickCheck.empty){

error.textContent="Este nickname já foi utilizado.";
error.style.display="block";
return;

}

/* envia referência */

await db.collection("referencias").add({

fullname,
nickname,
email,
message,
timestamp:firebase.firestore.FieldValue.serverTimestamp()

});

success.style.display="block";

form.reset();

}catch(err){

console.error(err);

error.textContent="Erro ao enviar referência.";
error.style.display="block";

}

});
</script>

<script>

const proofFolder="/public/provas/";

const proofFiles=[
"Simarillion Keeper.gif",
"joker.gif",
"L.gif",
"Grand General.gif",
"Abigali.gif",
"Oshaa.gif",
];

const proofImages=proofFiles.map(f=>proofFolder+f);

let proofIndex=0;
const proofImg=document.getElementById("proofCarouselImage");

function updateProof(){
proofImg.src=proofImages[proofIndex];
}

function nextProof(){
proofIndex=(proofIndex+1)%proofImages.length;
updateProof();
}

updateProof();
setInterval(nextProof,4000);

</script>

</body>
</html>
